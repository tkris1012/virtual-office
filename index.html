<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Office — 近づくと話せる仮想オフィス</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="topbar">
    <span class="logo">🏢 Virtual Office</span>
    <span id="room-label"></span>
    <span id="status">接続中…</span>
  </header>

  <!-- メディア操作バー（カメラ/マイク/背景） -->
  <div id="controls">
    <button id="btn-cam" class="ctrl" type="button" aria-pressed="true">🎥 カメラ ON</button>
    <button id="btn-mic" class="ctrl" type="button" aria-pressed="true">🎤 マイク ON</button>
    <label class="ctrl-group">
      背景
      <select id="bg-mode">
        <option value="none">なし</option>
        <option value="blur">ぼかし</option>
        <option value="image">バーチャル背景</option>
      </select>
    </label>
    <input id="blur-range" type="range" min="2" max="20" value="8" title="ぼかしの強さ" />
    <button id="btn-bg-image" class="ctrl" type="button">画像を選択</button>
    <input id="bg-file" type="file" accept="image/*" hidden />
    <span id="bg-note"></span>

    <span class="ctrl-sep"></span>
    <button id="btn-screen" class="ctrl" type="button">🖥️ 画面共有</button>
    <button id="btn-announce" class="ctrl" type="button">📢 アナウンス</button>
    <button id="btn-summon" class="ctrl" type="button">👥 集合</button>
  </div>

  <!-- アナウンス中バナー -->
  <div id="banner" hidden></div>

  <!-- 集合パネル（オンライン一覧から選んで呼び出す） -->
  <div id="summon-panel" hidden>
    <div class="sp-head">ここに集合させる人を選択</div>
    <div id="summon-list"></div>
    <div class="sp-actions">
      <button id="summon-go" class="ctrl" type="button">📍 ここに集合</button>
      <button id="summon-cancel" class="ctrl" type="button">閉じる</button>
    </div>
  </div>

  <!-- トースト通知 -->
  <div id="toasts"></div>

  <main>
    <!-- 通話映像のタイル一覧 -->
    <section id="videos"></section>

    <!-- マップ -->
    <div id="stage">
      <canvas id="map" width="640" height="960"></canvas>
      <div id="hint">移動: 矢印キー / WASD（スマホは左下のスティック）｜ 青い円に誰かが入ると自動で通話開始</div>
    </div>
  </main>

  <!-- タッチ端末用バーチャルジョイスティック（PCでは非表示） -->
  <div id="joystick"><div id="stick"></div></div>

  <script type="module" src="main.js"></script>
</body>
</html>
