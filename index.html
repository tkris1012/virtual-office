<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>Virtual Office — 近づくと話せる仮想オフィス</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- サインイン画面 -->
  <div id="signin">
    <div class="auth-card">
      <div class="lobby-logo"><i class="ti ti-building-community" aria-hidden="true"></i> Virtual Office</div>
      <p class="auth-sub">サインインして始めましょう</p>

      <button id="google-signin" type="button" class="auth-google">
        <i class="ti ti-brand-google" aria-hidden="true"></i> Google でログイン
      </button>

      <div class="auth-divider"><span>または</span></div>

      <label class="lobby-row" id="auth-name-row">ユーザー名（表示名）
        <input id="auth-name" type="text" maxlength="16" placeholder="あなたの名前" autocomplete="nickname" />
      </label>
      <label class="lobby-row">メールアドレス
        <input id="auth-email" type="email" placeholder="you@example.com" autocomplete="email" />
      </label>
      <label class="lobby-row">パスワード
        <input id="auth-pass" type="password" placeholder="6文字以上" autocomplete="current-password" />
      </label>
      <p id="auth-error" class="lobby-error" hidden></p>
      <button id="auth-submit" type="button" class="lobby-enter">メールアドレスで登録</button>
      <p class="auth-toggle">
        <span id="auth-toggle-text">アカウントをお持ちですか？</span>
        <a id="auth-toggle-link" href="#">ログイン</a>
      </p>
    </div>
  </div>

  <!-- 入室ロビー -->
  <div id="lobby" hidden>
    <div class="lobby-card">
      <div class="lobby-topbar">
        <div class="lobby-logo"><i class="ti ti-building-community" aria-hidden="true"></i> Virtual Office</div>
        <button id="lobby-settings" class="gear-btn" type="button" aria-label="プロフィール設定"><i class="ti ti-settings" aria-hidden="true"></i></button>
      </div>
      <label class="lobby-row">表示名
        <input id="lobby-name" type="text" maxlength="16" placeholder="あなたの名前" />
      </label>
      <label class="lobby-row">ルーム
        <input id="lobby-room" type="text" placeholder="例: company" />
      </label>
      <div class="preset-rooms">
        <button type="button" data-room="NCM" data-pass="ncm" data-fixed="1">NCM</button>
        <button type="button" id="create-room">＋ 新規ルーム作成</button>
      </div>
      <label class="lobby-row" id="pass-row">合言葉
        <input id="lobby-pass" type="password" placeholder="ルームの合言葉" />
      </label>
      <p id="lobby-error" class="lobby-error" hidden></p>
      <button id="lobby-enter" type="button" class="lobby-enter">入室する</button>
      <p class="lobby-note">新しいルーム名で入ると作成者になり合言葉を設定します。既存ルームは正しい合言葉が必要です。</p>
    </div>
  </div>

  <!-- 全画面マップ -->
  <canvas id="map" width="960" height="540"></canvas>

  <!-- 左上: ルーム / 在席 -->
  <div id="roompill">
    <i class="ti ti-building-community" aria-hidden="true"></i>
    <span id="room-label"></span>
    <span id="status">接続中…</span>
  </div>

  <!-- 上部中央: カメラ映像オーバーレイ -->
  <section id="videos"></section>

  <!-- 画面共有の大画面表示（共有中のみ） -->
  <div id="share-stage" hidden>
    <video id="share-video" autoplay playsinline muted></video>
    <div id="share-label"></div>
  </div>

  <!-- アナウンス中バナー -->
  <div id="banner" hidden></div>

  <!-- 下中央: アイコン操作バー -->
  <div id="controls">
    <button id="btn-cam" class="ctrl" type="button" aria-label="カメラ"><i class="ti ti-video" aria-hidden="true"></i></button>
    <button id="btn-mic" class="ctrl" type="button" aria-label="マイク"><i class="ti ti-microphone" aria-hidden="true"></i></button>
    <button id="btn-screen" class="ctrl" type="button" aria-label="画面共有"><i class="ti ti-screen-share" aria-hidden="true"></i></button>
    <button id="btn-bg" class="ctrl" type="button" aria-label="背景"><i class="ti ti-wallpaper" aria-hidden="true"></i></button>
    <button id="btn-announce" class="ctrl" type="button" aria-label="アナウンス"><i class="ti ti-speakerphone" aria-hidden="true"></i></button>
    <button id="btn-summon" class="ctrl" type="button" aria-label="集合"><i class="ti ti-users" aria-hidden="true"></i></button>
    <button id="btn-invite" class="ctrl" type="button" aria-label="招待リンク"><i class="ti ti-link" aria-hidden="true"></i></button>
    <button id="btn-settings" class="ctrl" type="button" aria-label="プロフィール設定"><i class="ti ti-settings" aria-hidden="true"></i></button>
    <button id="btn-leave" class="ctrl" type="button" aria-label="退出"><i class="ti ti-logout" aria-hidden="true"></i></button>
  </div>

  <!-- 背景ポップオーバー -->
  <div id="bg-popover" class="popover" hidden>
    <label class="pop-row">背景
      <select id="bg-mode">
        <option value="none">なし</option>
        <option value="blur">ぼかし</option>
        <option value="image">バーチャル背景</option>
      </select>
    </label>
    <label class="pop-row" id="blur-row">ぼかし強さ
      <input id="blur-range" type="range" min="2" max="20" value="8" />
    </label>
    <button id="btn-bg-image" class="ctrl-text" type="button">画像を選択</button>
    <input id="bg-file" type="file" accept="image/*" hidden />
    <span id="bg-note"></span>
  </div>

  <!-- 集合パネル -->
  <div id="summon-panel" class="popover" hidden>
    <div class="sp-head">ここに集合させる人を選択</div>
    <div id="summon-list"></div>
    <div class="sp-actions">
      <button id="summon-go" class="ctrl-text" type="button">ここに集合</button>
      <button id="summon-cancel" class="ctrl-text" type="button">閉じる</button>
    </div>
  </div>

  <!-- トースト通知 -->
  <div id="toasts"></div>

  <!-- スマホ用バーチャルジョイスティック -->
  <div id="joystick"><div id="stick"></div></div>

  <!-- プロフィール設定コンソール（左からスライドイン） -->
  <div id="console-backdrop" hidden></div>
  <aside id="console" hidden>
    <div class="console-head">
      <span>プロフィール設定</span>
      <button id="console-close" class="gear-btn" type="button" aria-label="閉じる"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <div class="console-body">
      <div class="console-preview">
        <div id="avatar-preview" class="avatar-preview"></div>
      </div>
      <label class="lobby-row">表示名
        <input id="console-name" type="text" maxlength="16" placeholder="あなたの名前" />
      </label>

      <div class="console-section-title">アイコンを選ぶ</div>
      <div id="preset-grid" class="preset-grid"></div>

      <button id="upload-icon" class="ctrl-text" type="button"><i class="ti ti-upload" aria-hidden="true"></i> 画像をアップロード</button>
      <input id="icon-file" type="file" accept="image/png,image/jpeg" hidden />
      <span id="console-note" class="console-note"></span>

      <button id="console-logout" class="console-logout" type="button"><i class="ti ti-logout" aria-hidden="true"></i> ログアウト</button>
    </div>
  </aside>

  <!-- 画像の円形クロップ -->
  <div id="crop-modal" hidden>
    <div class="crop-card">
      <div class="crop-title">切り抜く範囲を調整</div>
      <div class="crop-stage">
        <canvas id="crop-canvas" width="256" height="256"></canvas>
        <div class="crop-ring"></div>
      </div>
      <label class="crop-zoom">ズーム
        <input id="crop-range" type="range" min="1" max="3" step="0.01" value="1" />
      </label>
      <div class="crop-actions">
        <button id="crop-cancel" class="ctrl-text" type="button">キャンセル</button>
        <button id="crop-confirm" class="ctrl-text crop-ok" type="button">この範囲で設定</button>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
