<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" font-family="'Hiragino Kaku Gothic ProN','Meiryo',system-ui,sans-serif">
  <defs>
    <marker id="arrThin" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/></marker>
    <marker id="arrThinEnd" markerWidth="10" markerHeight="10" refX="1" refY="3" orient="auto"><path d="M8,0 L0,3 L8,6 Z" fill="#64748b"/></marker>
    <marker id="arrGreen" markerWidth="12" markerHeight="12" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#16a34a"/></marker>
    <marker id="arrGreenS" markerWidth="12" markerHeight="12" refX="1" refY="3.5" orient="auto"><path d="M9,0 L0,3.5 L9,7 Z" fill="#16a34a"/></marker>
    <marker id="arrPurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/></marker>
    <marker id="arrGray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <rect width="1280" height="860" fill="#ffffff"/>
  <text x="40" y="46" font-size="26" font-weight="700" fill="#0f172a">Virtual Office — 技術構成の関係図</text>
  <text x="40" y="74" font-size="15" fill="#475569">映像・音声は利用者どうしが直接やりとり（P2P）。クラウドは「位置合わせ」と「認証」だけを担当。</text>

  <!-- ===== 開発・配信レーン ===== -->
  <rect x="40" y="96" width="1200" height="96" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="56" y="118" font-size="13" font-weight="700" fill="#64748b">開発 &amp; 配信（作って公開するまで）</text>

  <g>
    <rect x="60" y="128" width="150" height="46" rx="9" fill="#eef2ff" stroke="#6366f1"/>
    <text x="135" y="150" font-size="13" font-weight="700" fill="#3730a3" text-anchor="middle">Claude Code</text>
    <text x="135" y="167" font-size="10.5" fill="#4f46e5" text-anchor="middle">AIが実装・PR作成</text>

    <rect x="250" y="128" width="150" height="46" rx="9" fill="#f1f5f9" stroke="#475569"/>
    <text x="325" y="150" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">GitHub リポジトリ</text>
    <text x="325" y="167" font-size="10.5" fill="#475569" text-anchor="middle">コード管理・履歴</text>

    <rect x="440" y="128" width="150" height="46" rx="9" fill="#f1f5f9" stroke="#475569"/>
    <text x="515" y="150" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">GitHub Actions</text>
    <text x="515" y="167" font-size="10.5" fill="#475569" text-anchor="middle">CI 自動チェック</text>

    <rect x="630" y="128" width="160" height="46" rx="9" fill="#ecfeff" stroke="#0891b2"/>
    <text x="710" y="150" font-size="13" font-weight="700" fill="#155e75" text-anchor="middle">GitHub Pages</text>
    <text x="710" y="167" font-size="10.5" fill="#0e7490" text-anchor="middle">静的サイトを無料HTTPS公開</text>

    <line x1="210" y1="151" x2="248" y2="151" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrGray)"/>
    <line x1="400" y1="151" x2="438" y2="151" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrGray)"/>
    <line x1="590" y1="151" x2="628" y2="151" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrGray)"/>

    <text x="900" y="146" font-size="12" fill="#0e7490">アプリ(HTML/JS/CSS)を</text>
    <text x="900" y="163" font-size="12" fill="#0e7490">利用者のブラウザへ配信 ↓</text>
    <line x1="710" y1="174" x2="710" y2="214" stroke="#0891b2" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrThin)"/>
  </g>

  <!-- ===== クラウド (Firebase) ===== -->
  <rect x="450" y="238" width="380" height="120" rx="14" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
  <text x="640" y="262" font-size="15" font-weight="700" fill="#b45309" text-anchor="middle">☁ クラウド（Firebase・Google／無料枠）</text>
  <rect x="470" y="276" width="165" height="64" rx="9" fill="#ffffff" stroke="#f59e0b"/>
  <text x="552" y="299" font-size="13" font-weight="700" fill="#92400e" text-anchor="middle">Realtime DB</text>
  <text x="552" y="316" font-size="10.5" fill="#b45309" text-anchor="middle">位置の同期</text>
  <text x="552" y="331" font-size="10.5" fill="#b45309" text-anchor="middle">接続の合図(シグナリング)</text>
  <rect x="645" y="276" width="165" height="64" rx="9" fill="#ffffff" stroke="#f59e0b"/>
  <text x="727" y="299" font-size="13" font-weight="700" fill="#92400e" text-anchor="middle">Authentication</text>
  <text x="727" y="316" font-size="10.5" fill="#b45309" text-anchor="middle">Google/メール認証</text>
  <text x="727" y="331" font-size="10.5" fill="#b45309" text-anchor="middle">本人確認・設定引継ぎ</text>

  <!-- ===== 利用者ブラウザ A / B ===== -->
  <!-- A -->
  <rect x="70" y="430" width="380" height="180" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="90" y="456" font-size="15" font-weight="700" fill="#1d4ed8">🧑‍💻 利用者A（ブラウザ）</text>
  <rect x="90" y="470" width="160" height="34" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="170" y="492" font-size="12" fill="#1e40af" text-anchor="middle">WebRTC（通話）</text>
  <rect x="262" y="470" width="168" height="34" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="346" y="492" font-size="12" fill="#1e40af" text-anchor="middle">Canvas 2D（マップ描画）</text>
  <rect x="90" y="512" width="160" height="34" rx="8" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="170" y="534" font-size="11.5" fill="#3730a3" text-anchor="middle">MediaPipe（背景処理）</text>
  <rect x="262" y="512" width="168" height="34" rx="8" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="346" y="534" font-size="11.5" fill="#3730a3" text-anchor="middle">Web Audio（通知音）</text>
  <rect x="90" y="554" width="340" height="34" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="260" y="576" font-size="11.5" fill="#475569" text-anchor="middle">localStorage（設定の控え・自己ベスト）</text>

  <!-- B -->
  <rect x="830" y="430" width="380" height="180" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="850" y="456" font-size="15" font-weight="700" fill="#1d4ed8">🧑‍💻 利用者B（ブラウザ）</text>
  <rect x="850" y="470" width="160" height="34" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="930" y="492" font-size="12" fill="#1e40af" text-anchor="middle">WebRTC（通話）</text>
  <rect x="1022" y="470" width="168" height="34" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="1106" y="492" font-size="12" fill="#1e40af" text-anchor="middle">Canvas 2D（マップ描画）</text>
  <rect x="850" y="512" width="160" height="34" rx="8" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="930" y="534" font-size="11.5" fill="#3730a3" text-anchor="middle">MediaPipe（背景処理）</text>
  <rect x="1022" y="512" width="168" height="34" rx="8" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="1106" y="534" font-size="11.5" fill="#3730a3" text-anchor="middle">Web Audio（通知音）</text>
  <rect x="850" y="554" width="340" height="34" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="1020" y="576" font-size="11.5" fill="#475569" text-anchor="middle">localStorage（設定の控え・自己ベスト）</text>

  <!-- ===== P2P（主役） ===== -->
  <line x1="450" y1="500" x2="830" y2="500" stroke="#16a34a" stroke-width="5" marker-start="url(#arrGreenS)" marker-end="url(#arrGreen)"/>
  <rect x="512" y="472" width="256" height="26" rx="13" fill="#dcfce7" stroke="#16a34a"/>
  <text x="640" y="490" font-size="13" font-weight="700" fill="#15803d" text-anchor="middle">映像・音声を直接やりとり（P2P）</text>
  <text x="640" y="524" font-size="11.5" fill="#15803d" text-anchor="middle">＝ サーバーを通らない・低遅延・サーバー費用ゼロ</text>

  <!-- ブラウザ → クラウド（位置/合図/認証） -->
  <path d="M300,430 C300,380 480,372 520,342" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrThin)"/>
  <path d="M980,430 C980,380 800,372 760,342" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrThin)"/>
  <rect x="300" y="392" width="190" height="24" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="395" y="409" font-size="11.5" fill="#334155" text-anchor="middle">位置の同期・合図・認証</text>
  <rect x="790" y="392" width="190" height="24" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="885" y="409" font-size="11.5" fill="#334155" text-anchor="middle">位置の同期・合図・認証</text>

  <!-- ===== STUN / TURN ===== -->
  <rect x="380" y="662" width="240" height="72" rx="12" fill="#f5f3ff" stroke="#7c3aed"/>
  <text x="500" y="686" font-size="13" font-weight="700" fill="#5b21b6" text-anchor="middle">STUN（Google 公開）</text>
  <text x="500" y="704" font-size="10.5" fill="#6d28d9" text-anchor="middle">P2P接続の「経路さがし」</text>
  <text x="500" y="720" font-size="10.5" fill="#6d28d9" text-anchor="middle">NAT越えの手助け</text>

  <rect x="660" y="662" width="240" height="72" rx="12" fill="#f5f3ff" stroke="#7c3aed"/>
  <text x="780" y="686" font-size="13" font-weight="700" fill="#5b21b6" text-anchor="middle">TURN（Metered）</text>
  <text x="780" y="704" font-size="10.5" fill="#6d28d9" text-anchor="middle">直結できない時だけ中継</text>
  <text x="780" y="720" font-size="10.5" fill="#6d28d9" text-anchor="middle">（iPhone黒画面対策・必要時のみ）</text>

  <path d="M260,610 C260,690 330,700 378,700" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrPurple)"/>
  <path d="M1020,610 C1020,690 950,700 902,700" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrPurple)"/>

  <!-- ===== 凡例 ===== -->
  <rect x="40" y="760" width="1200" height="72" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="56" y="782" font-size="12.5" font-weight="700" fill="#334155">凡例</text>
  <line x1="120" y1="795" x2="160" y2="795" stroke="#16a34a" stroke-width="5"/>
  <text x="168" y="799" font-size="12" fill="#334155">太線＝映像/音声(P2P・直接)</text>
  <line x1="400" y1="795" x2="440" y2="795" stroke="#64748b" stroke-width="2" marker-end="url(#arrThin)"/>
  <text x="448" y="799" font-size="12" fill="#334155">細線＝クラウド経由(位置/認証)</text>
  <line x1="700" y1="795" x2="740" y2="795" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrPurple)"/>
  <text x="748" y="799" font-size="12" fill="#334155">破線＝必要時だけ(TURN中継)</text>
  <text x="120" y="820" font-size="12" fill="#475569">■青=利用者のブラウザ内で動く技術　■橙=クラウド(Firebase)　■紫=NAT越え支援　■上段=開発/配信</text>
</svg>
